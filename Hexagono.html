<!DOCTYPE html>
<html>
<head>
<style>
.hexagono {
  width: 200px;
  height: 115px;
  background: teal;
  position: relative;
  margin: 100px auto;
}

.hexagono::before,
.hexagono::after {
  content: "";
  position: absolute;
  width: 0;
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
}

.hexagono::before {
  bottom: 100%;
  border-bottom: 57px solid teal;
}

.hexagono::after {
  top: 100%;
  border-top: 57px solid teal;
}
</style>
</head>
<body>
<div class="hexagono"></div>
</body>
</html>

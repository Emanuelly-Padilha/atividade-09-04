<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Hexágono</title>

<style>
/* Parte central do hexágono */
.hexagono {

  width: 200px;
  height: 115px;

  background: teal;

  position: relative;
  margin: 100px auto;
}

/* Parte superior */
.hexagono::before {

  content: "";
  position: absolute;

  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-bottom: 57px solid teal;

  bottom: 100%;
}

/* Parte inferior */
.hexagono::after {

  content: "";
  position: absolute;

  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-top: 57px solid teal;

  top: 100%;
}
</style>
</head>

<body>

<div class="hexagono"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Paralelogramo</title>

<style>
/* Classe do paralelogramo */
.paralelogramo {

  width: 200px;
  height: 100px;

  background: purple;

  /* Inclinação para formar o paralelogramo */
  transform: skew(20deg);

  margin: 100px auto;
}
</style>
</head>

<body>

<div class="paralelogramo"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Triângulo Invertido</title>

<style>
/* Classe do triângulo invertido */
.triangulo-invertido {

  width: 0;
  height: 0;

  border-left: 100px solid transparent;
  border-right: 100px solid transparent;

  /* Parte superior define o triângulo invertido */
  border-top: 150px solid red;

  margin: 100px auto;
}
</style>
</head>

<body>

<div class="triangulo-invertido"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Trapézio</title>

<style>
/* Classe do trapézio */
.trapezio {

  width: 200px;
  height: 0;

  /* Base do trapézio */
  border-bottom: 100px solid green;

  /* Lados inclinados */
  border-left: 50px solid transparent;
  border-right: 50px solid transparent;

  margin: 100px auto;
}
</style>
</head>

<body>

<div class="trapezio"></div>

</body>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pentágono</title>

<style>
/* Classe do pentágono */
.pentagono {

  width: 120px;
  height: 120px;

  background: blue;

  /* Define os pontos da figura */
  clip-path: polygon(50% 0%, 100% 40%, 80% 100%, 20% 100%, 0% 40%);

  margin: 100px auto;
}
</style>
</head>

<body>

<div class="pentagono"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Octógono</title>

<style>
/* Classe do octógono */
.octogono {

  width: 120px;
  height: 120px;

  background: brown;

  /* Define os 8 lados */
  clip-path: polygon(
    30% 0%, 70% 0%, 100% 30%, 100% 70%,
    70% 100%, 30% 100%, 0% 70%, 0% 30%
  );

  margin: 100px auto;
}
</style>
</head>

<body>

<div class="octogono"></div>

</body>
</html>

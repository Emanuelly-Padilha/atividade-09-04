<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Triângulo</title>

<style>
/* Classe que cria o triângulo */
.triangulo {

  /* Necessário para formar o triângulo com bordas */
  width: 0;
  height: 0;

  /* Lados transparentes */
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;

  /* Base do triângulo (cor e tamanho) */
  border-bottom: 150px solid blue;

  /* Centraliza na tela */
  margin: 100px auto;
}
</style>
</head>

<body>

<!-- Elemento que representa o triângulo -->
<div class="triangulo"></div>

</body>
</html>

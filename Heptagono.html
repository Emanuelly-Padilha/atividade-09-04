<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Heptágono</title>

<style>
/* Classe do heptágono */
.heptagono {

  width: 120px;
  height: 120px;

  background: pink;

  /* Define os 7 lados */
  clip-path: polygon(
    50% 0%, 90% 20%, 100% 60%, 
    75% 100%, 25% 100%, 0% 60%, 10% 20%
  );

  margin: 100px auto;
}
</style>
</head>

<body>

<div class="heptagono"></div>

</body>
</html>
